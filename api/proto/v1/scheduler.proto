syntax = "proto3";

package gosched.v1;

option go_package = "github.com/ilya-shevelev/gosched/api/proto/v1;v1";

import "api/proto/v1/job.proto";
import "api/proto/v1/resource.proto";
import "api/proto/v1/node.proto";

// SchedulerService is the main scheduling API.
service SchedulerService {
  // SubmitJob submits a new job for scheduling.
  rpc SubmitJob(SubmitJobRequest) returns (SubmitJobResponse);
  // GetJob retrieves a job by ID.
  rpc GetJob(GetJobRequest) returns (GetJobResponse);
  // ListJobs lists all jobs with optional filters.
  rpc ListJobs(ListJobsRequest) returns (ListJobsResponse);
  // CancelJob cancels a pending or running job.
  rpc CancelJob(CancelJobRequest) returns (CancelJobResponse);
  // GetClusterStatus returns the current cluster state.
  rpc GetClusterStatus(GetClusterStatusRequest) returns (GetClusterStatusResponse);
}

message SubmitJobRequest {
  Job job = 1;
}

message SubmitJobResponse {
  string job_id = 1;
}

message GetJobRequest {
  string job_id = 1;
}

message GetJobResponse {
  Job job = 1;
}

message ListJobsRequest {
  string state = 1;
  string queue = 2;
  string tenant = 3;
  int32 limit = 4;
}

message ListJobsResponse {
  repeated Job jobs = 1;
}

message CancelJobRequest {
  string job_id = 1;
}

message CancelJobResponse {
  bool success = 1;
}

message GetClusterStatusRequest {}

message GetClusterStatusResponse {
  int32 total_nodes = 1;
  int32 healthy_nodes = 2;
  int32 pending_jobs = 3;
  int32 running_jobs = 4;
  Resources total_resources = 5;
  Resources used_resources = 6;
}
