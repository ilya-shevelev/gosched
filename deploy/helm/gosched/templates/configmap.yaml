apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  labels:
    app.kubernetes.io/name: gosched
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  gosched.yaml: |
    server:
      grpc_addr: ":{{ .Values.master.service.grpcPort }}"
      http_addr: ":{{ .Values.master.service.httpPort }}"
      algorithm: "{{ .Values.master.config.algorithm }}"
      schedule_period: "{{ .Values.master.config.schedulePeriod }}"
    raft:
      enabled: false
    queues:
      - name: default
        type: fifo
        capacity_pct: 100
